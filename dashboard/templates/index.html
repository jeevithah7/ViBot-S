<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ViBot-S | 3D Simulation</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <!-- Three.js r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    :root {
      --panel:#1e2127; --border:#373d48; --text:#c5cdd9;
      --accent:#4fc3f7; --green:#66bb6a; --red:#ef5350; --yellow:#ffd54f;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:#0a0a0e; overflow:hidden; font-family:'Roboto',sans-serif; }

    /* ── 3D Canvas fullscreen ─────────────────────────────────────────── */
    #three-canvas { position:fixed; inset:0; display:block; }

    /* ── Sidebar (left, overlay) ──────────────────────────────────────── */
    #sidebar {
      position:fixed; top:0; left:0; bottom:0;
      width:290px;
      background:rgba(18,20,26,0.93);
      border-right:1px solid var(--border);
      display:flex; flex-direction:column;
      backdrop-filter:blur(8px);
      z-index:10;
      transition:transform .25s ease;
    }
    #sidebar.collapsed { transform:translateX(-290px); }

    #collapse-btn {
      position:fixed; top:50%; left:290px;
      transform:translateY(-50%);
      z-index:11; cursor:pointer;
      background:rgba(18,20,26,0.9);
      border:1px solid var(--border); border-left:none;
      padding:10px 5px; border-radius:0 6px 6px 0;
      color:var(--text); font-size:13px; line-height:1;
      transition:left .25s ease;
      backdrop-filter:blur(8px);
    }
    #sidebar.collapsed ~ #collapse-btn { left:0px; }

    /* ── Sidebar top toolbar ─────────────────────────────────────────── */
    #sb-toolbar {
      height:36px; background:#141519;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 12px; gap:8px; flex-shrink:0;
    }
    .sb-logo { color:var(--accent); font-weight:700; font-size:13px; font-family:'Roboto Mono',monospace; }
    .sb-pill {
      font-size:9px; padding:2px 7px; border-radius:10px;
      background:rgba(102,187,106,0.18); color:var(--green); border:1px solid rgba(102,187,106,0.3);
    }

    /* ── Sidebar sections ────────────────────────────────────────────── */
    .sb-section { flex-shrink:0; }
    .sb-section.grow { flex:1; min-height:0; display:flex; flex-direction:column; }
    .sb-hdr {
      height:26px; background:#1a1c22;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 10px;
      font-size:9px; font-family:'Roboto Mono',monospace;
      text-transform:uppercase; letter-spacing:1px; color:#666;
      flex-shrink:0;
    }
    .sb-hdr b { color:var(--accent); }

    /* Camera feed */
    #cam-wrap { height:160px; background:#000; overflow:hidden; position:relative; flex-shrink:0; }
    #cam-img  { width:100%; height:100%; object-fit:cover; }
    .cam-hud  {
      position:absolute; bottom:5px; left:6px;
      font-family:'Roboto Mono',monospace; font-size:8px; color:#0f0;
      background:rgba(0,0,0,0.65); padding:3px 7px; line-height:1.7;
    }

    /* 2D Map */
    #map-wrap { flex:1; min-height:0; background:#0c0d10; display:flex; align-items:center; justify-content:center; padding:8px; overflow:hidden; }
    #map-canvas { max-width:100%; max-height:100%; }

    /* Stats */
    #stats-body {
      padding:8px 10px; flex-shrink:0;
      font-family:'Roboto Mono',monospace; font-size:10px; line-height:2.1;
      border-top:1px solid var(--border);
    }
    .sr { display:flex; justify-content:space-between; }
    .sl { color:#666; }
    .sv { color:var(--text); }
    .sv.ok { color:var(--green); }
    .sv.warn { color:var(--yellow); }

    /* ── Top HUD (fullscreen overlay) ──────────────────────────────── */
    #hud-top {
      position:fixed; top:0; left:290px; right:0;
      height:34px;
      background:rgba(14,15,20,0.85);
      border-bottom:1px solid rgba(255,255,255,0.06);
      display:flex; align-items:center; padding:0 18px; gap:24px;
      z-index:5; backdrop-filter:blur(6px);
    }
    .hud-item { font-family:'Roboto Mono',monospace; font-size:10px; color:#666; white-space:nowrap; }
    .hud-item b { color:var(--accent); }

    /* ── Camera mode buttons (bottom right) ────────────────────────── */
    #cam-controls {
      position:fixed; bottom:18px; right:18px;
      display:flex; gap:8px; z-index:10;
    }
    .cam-btn {
      padding:7px 14px; font-size:10px; font-family:'Roboto Mono',monospace;
      background:rgba(20,22,28,0.9); border:1px solid var(--border);
      color:var(--text); cursor:pointer; border-radius:4px;
      transition:background .15s; backdrop-filter:blur(6px);
    }
    .cam-btn:hover { background:rgba(79,195,247,0.15); border-color:var(--accent); }
    .cam-btn.active { background:rgba(79,195,247,0.22); border-color:var(--accent); color:var(--accent); }

    /* ── Path toggle ────────────────────────────────────────────────── */
    #path-toggle {
      position:fixed; bottom:58px; right:18px; z-index:10;
    }
  </style>
</head>
<body>

<!-- 3D Canvas -->
<canvas id="three-canvas"></canvas>

<!-- Left Sidebar -->
<div id="sidebar">
  <div id="sb-toolbar">
    <span class="sb-logo">ViBot&#8209;S</span>
    <span class="sb-pill">● LIVE</span>
  </div>

  <!-- FPV Camera feed -->
  <div class="sb-section">
    <div class="sb-hdr">Camera &nbsp;[/robot/image_raw] <b>ORB·SLAM</b></div>
    <div id="cam-wrap">
      <img id="cam-img" src="/stream/video" onerror="setTimeout(()=>{this.src='/stream/video?t='+Date.now()},2000)"/>
      <div class="cam-hud">FPV · ORB&#8209;SLAM Lite<br>Plugin: visual_odometry</div>
    </div>
  </div>

  <!-- 2D Occupancy Map -->
  <div class="sb-section grow">
    <div class="sb-hdr">OccupancyGrid &nbsp;[/vibot/map] <b>A*</b></div>
    <div id="map-wrap"><canvas id="map-canvas"></canvas></div>
  </div>

  <!-- Robot Stats -->
  <div class="sb-section">
    <div id="stats-body">
      <div class="sr"><span class="sl">Pos X</span><span class="sv" id="st-x">--</span></div>
      <div class="sr"><span class="sl">Pos Y</span><span class="sv" id="st-y">--</span></div>
      <div class="sr"><span class="sl">Heading</span><span class="sv" id="st-h">--</span></div>
      <div class="sr"><span class="sl">Nav</span><span class="sv ok" id="st-nav">--</span></div>
      <div class="sr"><span class="sl">Steps</span><span class="sv" id="st-s">--</span></div>
      <div class="sr"><span class="sl">Elapsed</span><span class="sv" id="st-t">--</span></div>
    </div>
  </div>
</div>

<!-- Collapse toggle -->
<div id="collapse-btn" onclick="toggleSidebar()">◀</div>

<!-- Top HUD -->
<div id="hud-top">
  <span class="hud-item">Fixed Frame:&nbsp;<b id="hf">map</b></span>
  <span class="hud-item">Time:&nbsp;<b id="ht">0.0 s</b></span>
  <span class="hud-item">FPS:&nbsp;<b id="hfps">--</b></span>
  <span class="hud-item" id="hpos">Pos: (0, 0) m</span>
  <span class="hud-item" style="margin-left:auto; color:var(--green)">● 3D SIM RUNNING</span>
</div>

<!-- Camera controls -->
<div id="cam-controls">
  <div class="cam-btn active" id="btn-follow" onclick="setCam('follow')">👁 Follow</div>
  <div class="cam-btn" id="btn-orbit"  onclick="setCam('orbit')">🔄 Orbit</div>
  <div class="cam-btn" id="btn-top"    onclick="setCam('top')">⬆ Top</div>
  <div class="cam-btn" id="btn-fps"    onclick="setCam('fps')">🤖 FPV</div>
</div>

<div id="path-toggle">
  <div class="cam-btn active" id="btn-path" onclick="togglePath()">◌ Path</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// THREE.JS SCENE SETUP
// ─────────────────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a10);
scene.fog = new THREE.FogExp2(0x0a0a10, 0.012);

const camera3 = new THREE.PerspectiveCamera(55, 1, 0.1, 300);
camera3.position.set(7, 8, -5);

// Orbit controls (used in orbit and top modes)
const orbit = new THREE.OrbitControls(camera3, canvas);
orbit.enableDamping = true; orbit.dampingFactor = 0.08;
orbit.enabled = false;

// ─────────────────────────────────────────────────────────────────────────────
// LIGHTING
// ─────────────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x8899bb, 0.5));

const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(10, 20, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 80;
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top  =  30; sun.shadow.camera.bottom = -30;
scene.add(sun);

// Accent strips (ceiling lights)
function addStrip(x, z) {
  const l = new THREE.PointLight(0xaadeff, 0.6, 15);
  l.position.set(x, 3.5, z);
  scene.add(l);
}

// ─────────────────────────────────────────────────────────────────────────────
// MATERIALS
// ─────────────────────────────────────────────────────────────────────────────
// Procedural floor texture (tile pattern)
function makeFloorTex() {
  const c = document.createElement('canvas'); c.width=256; c.height=256;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#b0b0b8'; ctx.fillRect(0,0,256,256);
  ctx.strokeStyle='#8888a0'; ctx.lineWidth=2;
  for(let i=0;i<256;i+=32){ ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,256);ctx.stroke(); }
  for(let i=0;i<256;i+=32){ ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(256,i);ctx.stroke(); }
  const t = new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
// Wall texture
function makeWallTex() {
  const c = document.createElement('canvas'); c.width=256; c.height=256;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#d8d0c0'; ctx.fillRect(0,0,256,256);
  ctx.fillStyle='#c8c0b0';
  for(let r=0;r<8;r++) {
    const off = (r%2)*128;
    for(let col=0;col<3;col++)
      ctx.fillRect(off+col*256-128, r*32, 110, 28);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

const floorTex = makeFloorTex();
const wallTex  = makeWallTex();
floorTex.repeat.set(8,8);

const matFloor = new THREE.MeshStandardMaterial({ map:floorTex, roughness:0.8, metalness:0.1 });
const matWall  = new THREE.MeshStandardMaterial({ map:wallTex,  roughness:0.9 });
const matObs   = new THREE.MeshStandardMaterial({ color:0x8a5a3a, roughness:0.6 }); // brown chairs/obstacles
const matGoal  = new THREE.MeshStandardMaterial({ color:0x44cc44, roughness:0.4, emissive:0x116611 });

// ─────────────────────────────────────────────────────────────────────────────
// ROBOT MODEL
// ─────────────────────────────────────────────────────────────────────────────
const robotGroup = new THREE.Group();

// Body (acrylic look)
const bodyMat = new THREE.MeshPhysicalMaterial({
  color:0x223355, roughness:0.15, metalness:0.7,
  clearcoat:1.0, clearcoatRoughness:0.1
});
const body = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.48, 0.3, 32), bodyMat);
body.position.y = 0.45; body.castShadow = true;
robotGroup.add(body);

// Top plate
const topPlateMat = new THREE.MeshPhysicalMaterial({
  color:0x334466, transparent:true, opacity:0.85, roughness:0.1, metalness:0.6
});
const topPlate = new THREE.Mesh(new THREE.CylinderGeometry(0.38,0.38,0.05,32), topPlateMat);
topPlate.position.y = 0.65; robotGroup.add(topPlate);

// Wheel factory
function makeWheel(side) {
  const wMat = new THREE.MeshStandardMaterial({ color:0x222222, roughness:0.9 });
  const rimMat = new THREE.MeshStandardMaterial({ color:0xffd700, roughness:0.3, metalness:0.8 });
  const wGrp = new THREE.Group();
  const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.32,0.14,32), wMat);
  wheel.rotation.x = Math.PI/2; wheel.castShadow=true;
  const rim   = new THREE.Mesh(new THREE.TorusGeometry(0.28,0.04,8,32), rimMat);
  rim.rotation.x = Math.PI/2;
  wGrp.add(wheel, rim);
  wGrp.position.set(0, 0.32, side*0.52);
  return wGrp;
}
const wL = makeWheel(1), wR = makeWheel(-1);
robotGroup.add(wL, wR);

// Camera eye (front sensor)
const eyeMat = new THREE.MeshStandardMaterial({ color:0x00d4ff, emissive:0x004466, roughness:0.1 });
const eye    = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.16), eyeMat);
eye.position.set(0.44, 0.55, 0); robotGroup.add(eye);

// Antenna
const antMat = new THREE.MeshStandardMaterial({color:0x888888,metalness:0.8});
const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.3,8), antMat);
ant.position.set(-0.1,0.9,0); robotGroup.add(ant);
const antTip = new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8), new THREE.MeshStandardMaterial({color:0xff4444,emissive:0x330000}));
antTip.position.set(-0.1,1.06,0); robotGroup.add(antTip);

robotGroup.castShadow = true;
scene.add(robotGroup);

// ─────────────────────────────────────────────────────────────────────────────
// SCENE CONSTRUCTION (from grid data)
// ─────────────────────────────────────────────────────────────────────────────
let sceneBuilt=false, ROWS=0, COLS=0;
let pathLine = null;
let goalMesh  = null;
let pathVisible = true;

function buildScene(grid, goal) {
  if (sceneBuilt) return;
  ROWS = grid.length; COLS = grid[0].length;

  // Floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(COLS, ROWS), matFloor);
  floor.rotation.x = -Math.PI/2;
  floor.position.set(COLS/2, 0, ROWS/2);
  floor.receiveShadow = true;
  scene.add(floor);

  // Ceiling (dim)
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(COLS,ROWS),
    new THREE.MeshStandardMaterial({color:0x303040, side:THREE.BackSide}));
  ceil.rotation.x = Math.PI/2;
  ceil.position.set(COLS/2, 3.5, ROWS/2);
  scene.add(ceil);

  // Ceiling strip lights
  for(let r=5;r<ROWS;r+=8) addStrip(COLS/2, r);

  const wallH = 3.0, wallGeo = new THREE.BoxGeometry(1,wallH,1);

  // Outer perimeter walls (full surrounding)
  const perimMat = new THREE.MeshStandardMaterial({color:0xd0c8b8, roughness:0.9, map:wallTex});
  function addPerimWall(c, r) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(1,wallH,1), perimMat);
    m.position.set(c+0.5, wallH/2, r+0.5);
    m.castShadow=m.receiveShadow=true; scene.add(m);
  }

  // Obstacle cells vs perimeter
  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      if (grid[r][c]!==1) continue;
      const isPerim = (r===0||r===ROWS-1||c===0||c===COLS-1);
      const mat = isPerim ? perimMat : matObs;
      const h   = isPerim ? wallH : 0.9;
      const m = new THREE.Mesh(new THREE.BoxGeometry(1,h,1), mat);
      m.position.set(c+0.5, h/2, r+0.5);
      m.castShadow = m.receiveShadow = true;
      scene.add(m);

      // Red top edge stripe on perimeter
      if (isPerim) {
        const stripe = new THREE.Mesh(
          new THREE.BoxGeometry(1.01,0.06,1.01),
          new THREE.MeshBasicMaterial({color:0xdd2222})
        );
        stripe.position.set(c+0.5, wallH+0.03, r+0.5);
        scene.add(stripe);
      }
    }
  }

  // Goal marker (glowing ring)
  if (goal) {
    const [gr, gc] = goal;
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.5, 0.06, 8, 32),
      new THREE.MeshStandardMaterial({color:0x44ee44, emissive:0x226622})
    );
    ring.rotation.x = Math.PI/2;
    ring.position.set(gc+0.5, 0.08, gr+0.5);
    scene.add(ring);
    goalMesh = ring;

    // Goal cylinder
    const cyl = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08,0.08,0.8,12),
      new THREE.MeshStandardMaterial({color:0x44ee44, emissive:0x116611})
    );
    cyl.position.set(gc+0.5, 0.4, gr+0.5);
    scene.add(cyl);
  }

  sceneBuilt = true;
}

function buildPath(path) {
  if (!path || path.length < 2) return;
  if (pathLine) scene.remove(pathLine);
  const pts = path.map(p => new THREE.Vector3(p[1]+0.5, 0.06, p[0]+0.5));
  const geo  = new THREE.BufferGeometry().setFromPoints(pts);
  pathLine   = new THREE.Line(geo, new THREE.LineBasicMaterial({color:0x44aa44, linewidth:2}));
  pathLine.visible = pathVisible;
  scene.add(pathLine);
}

// ─────────────────────────────────────────────────────────────────────────────
// ANIMATION STATE
// ─────────────────────────────────────────────────────────────────────────────
let camMode = 'follow';
let targetX=0, targetZ=0, targetTh=0;    // SSE destination
let curX=0, curZ=0, curTheta=0;          // smoothed current
let accumulated = 0;

// Wheel spin time
let wheelSpin = 0;

function setCam(mode) {
  camMode = mode;
  ['follow','orbit','top','fps'].forEach(m => {
    document.getElementById('btn-'+m).classList.toggle('active', m===mode);
  });
  orbit.enabled = (mode==='orbit');
  if(mode==='top') {
    camera3.position.set(COLS/2||7, 22, ROWS/2||15);
    camera3.lookAt(COLS/2||7, 0, ROWS/2||15);
  }
}

function togglePath() {
  pathVisible = !pathVisible;
  if(pathLine) pathLine.visible = pathVisible;
  document.getElementById('btn-path').classList.toggle('active', pathVisible);
}

function toggleSidebar() {
  const sb  = document.getElementById('sidebar');
  const btn = document.getElementById('collapse-btn');
  const hud = document.getElementById('hud-top');
  const cc  = document.getElementById('cam-controls');
  const pt  = document.getElementById('path-toggle');

  const collapse = !sb.classList.toggle('collapsed');
  btn.textContent = sb.classList.contains('collapsed') ? '▶' : '◀';
  const offset = sb.classList.contains('collapsed') ? '0' : '290px';
  hud.style.left = offset;
  cc.style.right  = '18px';
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let fps=0, fpsTime=0, fpsCount=0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  fpsCount++;
  fpsTime += dt;
  if(fpsTime >= 1.0) {
    fps = fpsCount; fpsCount=0; fpsTime=0;
    document.getElementById('hfps').textContent = fps;
  }

  // Smooth interpolation (lerp factor ~ 6/s)
  const lf = 1 - Math.pow(0.01, dt * 6);
  curX     += (targetX  - curX    ) * lf;
  curZ     += (targetZ  - curZ    ) * lf;
  // Angle wrap
  let dth = targetTh - curTheta;
  while(dth >  Math.PI) dth -= 2*Math.PI;
  while(dth < -Math.PI) dth += 2*Math.PI;
  curTheta += dth * lf;

  // Update robot position
  robotGroup.position.set(curX, 0, curZ);
  robotGroup.rotation.y = -curTheta;

  // Spin wheels (proportional to speed)
  const speed = Math.hypot(targetX-curX, targetZ-curZ);
  wheelSpin += dt * 4 * (speed > 0.02 ? 3 : 0.2);
  wL.children[0].rotation.z = wheelSpin;
  wR.children[0].children && (wR.children[0].rotation.z = wheelSpin);

  // Pulse antenna tip
  antTip.material.emissiveIntensity = 0.5 + 0.5*Math.sin(clock.elapsedTime * 3);

  // Goal ring rotation
  if (goalMesh) goalMesh.rotation.z += dt * 0.8;

  // Camera updates
  if(camMode==='follow') {
    // Cinematic 3rd person follow
    const dist  = 6, height = 4;
    const tCamX = curX - dist * Math.sin(curTheta);
    const tCamZ = curZ - dist * Math.cos(curTheta);
    camera3.position.lerp(new THREE.Vector3(tCamX, height, tCamZ), 0.07);
    const lookAt = new THREE.Vector3(curX, 0.5, curZ);
    camera3.lookAt(lookAt);
  } else if(camMode==='fps') {
    camera3.position.set(
      curX + 0.5*Math.sin(curTheta), 0.65,
      curZ + 0.5*Math.cos(curTheta)
    );
    camera3.lookAt(
      curX + 2*Math.sin(curTheta), 0.55,
      curZ + 2*Math.cos(curTheta)
    );
  } else if(camMode==='orbit') {
    orbit.update();
  }

  renderer.render(scene, camera3);
}

// ─────────────────────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────────────────────
function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera3.aspect = window.innerWidth / window.innerHeight;
  camera3.updateProjectionMatrix();
}
window.addEventListener('resize', onResize); onResize(); animate();

// ─────────────────────────────────────────────────────────────────────────────
// 2D MAP CANVAS
// ─────────────────────────────────────────────────────────────────────────────
const mCanvas = document.getElementById('map-canvas');
const mCtx    = mCanvas.getContext('2d');
let mapPath = [];

function renderMap(grid, path) {
  if(!grid||!grid.length) return;
  mapPath = path||[];
  const wrap = document.getElementById('map-wrap');
  const R=grid.length, C=grid[0].length, asp=C/R;
  let W=wrap.clientWidth-16, H=W/asp;
  if(H>wrap.clientHeight-16){ H=wrap.clientHeight-16; W=H*asp; }
  W=Math.floor(W); H=Math.floor(H);
  mCanvas.width=W; mCanvas.height=H;
  const sx=W/C, sy=H/R;
  mCtx.fillStyle='#0c0d10'; mCtx.fillRect(0,0,W,H);
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) {
    mCtx.fillStyle = grid[r][c]===1 ? '#1a1a1a' : '#e8e8e8';
    mCtx.fillRect(c*sx, r*sy, sx+0.5, sy+0.5);
  }
  if(mapPath.length>1) {
    mCtx.beginPath();
    mCtx.moveTo(mapPath[0][1]*sx+sx/2, mapPath[0][0]*sy+sy/2);
    for(let i=1;i<mapPath.length;i++)
      mCtx.lineTo(mapPath[i][1]*sx+sx/2, mapPath[i][0]*sy+sy/2);
    mCtx.strokeStyle='#44cc44'; mCtx.lineWidth=2.5; mCtx.lineCap='round'; mCtx.stroke();
  }
  // Goal
  mCtx.fillStyle='#ee4444';
  mCtx.beginPath(); mCtx.arc(7*sx+sx/2,27*sy+sy/2,5,0,2*Math.PI); mCtx.fill();
  // Robot
  mCtx.save();
  mCtx.translate(curX*sx+sx/2, curZ*sy+sy/2);
  mCtx.rotate(curTheta+Math.PI/2);
  mCtx.fillStyle='#4fc3f7';
  mCtx.beginPath(); mCtx.moveTo(0,-9); mCtx.lineTo(6,7); mCtx.lineTo(-6,7); mCtx.fill();
  mCtx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// SSE
// ─────────────────────────────────────────────────────────────────────────────
let lastPath = [], lastGrid = null, lastGoal = [27,7];

const sse = new EventSource('/stream/events');
sse.onmessage = (e) => {
  const d = JSON.parse(e.data);
  targetX  = d.smooth_x;
  targetZ  = d.smooth_y;
  targetTh = d.smooth_theta;

  if(d.grid) {
    lastGrid = d.grid;
    buildScene(d.grid, lastGoal);
  }
  if(d.path && d.path.length !== lastPath.length) {
    lastPath = d.path;
    buildPath(d.path);
  }

  renderMap(lastGrid, lastPath);

  document.getElementById('st-x').textContent    = targetX.toFixed(3)+' m';
  document.getElementById('st-y').textContent    = targetZ.toFixed(3)+' m';
  document.getElementById('st-h').textContent    = ((d.smooth_theta*180/Math.PI)%360).toFixed(1)+'°';
  document.getElementById('st-nav').textContent  = d.nav_status||'--';
  document.getElementById('st-s').textContent    = `${d.step_idx||0}/${d.total_steps||'--'}`;
  document.getElementById('st-t').textContent    = (d.elapsed||0).toFixed(1)+' s';
  document.getElementById('ht').textContent      = (d.elapsed||0).toFixed(1)+' s';
  document.getElementById('hpos').textContent    = `Pos: (${targetX.toFixed(2)}, ${targetZ.toFixed(2)}) m`;
};
</script>
